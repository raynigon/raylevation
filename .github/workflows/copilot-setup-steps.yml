name: "Copilot Setup Steps"

# Run setup steps when this file changes (for easy validation),
# and allow manual runs from the Actions tab.
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be called `copilot-setup-steps` to be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest
    container: ghcr.io/osgeo/gdal:ubuntu-full-3.11.0

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Java 21 and unrar
        run: |
          apt-get update
          apt-get install -y --no-install-recommends openjdk-21-jdk-headless unrar

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: false
        env:
          JAVA_HOME: /usr/lib/jvm/java-21-openjdk-amd64

      - name: Pre-warm Gradle dependency cache
        run: ./gradlew dependencies --configuration compileClasspath --configuration testCompileClasspath --configuration runtimeClasspath
        env:
          JAVA_HOME: /usr/lib/jvm/java-21-openjdk-amd64
