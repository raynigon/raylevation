name: CI - Main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: "Test"
    runs-on: ubuntu-latest
    container: ghcr.io/osgeo/gdal:ubuntu-full-3.11.0
    steps:
      - uses: actions/checkout@v6
      - name: "Install Dependencies"
        run: |
          apt-get update
          apt-get install -y --no-install-recommends unrar openjdk-21-jdk-headless
      - name: Gradle Command - test
        run: "./gradlew clean test"
        env:
          JAVA_HOME: /usr/lib/jvm/java-21-openjdk-amd64
      - name: Codacy Publish
        uses: codacy/codacy-coverage-reporter-action@master
        if: github.actor != 'dependabot[bot]'
        with:
          project-token: ${{ secrets.CODACY_TOKEN }}

  static_analysis:
    name: "Static Code Analysis"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5.2.0
        with:
          java-version: 21
          distribution: temurin
      - name: "Setup gradle"
        uses: gradle/actions/setup-gradle@v6
      - name: Kotlin Linter
        run: "./gradlew ktlintCheck"
      - name: Checkstyle Linter
        run: "./gradlew checkstyleMain"
      - name: PMD Linter
        run: "./gradlew pmdMain"
      - uses: jwgmeligmeyling/checkstyle-github-action@master
        with:
          path: '**/checkstyle/main.xml'
      - name: Run Codacy Analysis CLI
        uses: codacy/codacy-analysis-cli-action@master
        if: github.actor != 'dependabot[bot]'
        with:
          tool: spotbugs
          project-token: ${{ secrets.CODACY_TOKEN }}
          upload: true
          max-allowed-issues: 2147483647

  docker:
    name: "Build Docker Image"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5.2.0
        with:
          java-version: 21
          distribution: temurin
      - name: "Setup gradle"
        uses: gradle/actions/setup-gradle@v6
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          registry: "ghcr.io"
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Gradle Command - jibDockerBuild
        run: "./gradlew jibDockerBuild -x check"
      - name: Test Docker Image
        run: ".github/scripts/test-docker-image.sh"
        timeout-minutes: 2

  dokka:
    name: "Code Documentation"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5.2.0
        with:
          java-version: 21
          distribution: temurin
      - name: "Setup gradle"
        uses: gradle/actions/setup-gradle@v6
      - name: Generate javadoc
        run: "./gradlew dokkaGenerateHtml"
      - name: Upload Dokka
        uses: sebastianpopp/ftp-action@releases/v2
        if: github.ref == 'refs/heads/main' || contains(github.ref, 'refs/tags/')
        with:
          host: ${{ secrets.WEBSPACE_HOST }}
          user: ${{ secrets.WEBSPACE_USER }}
          password: ${{ secrets.WEBSPACE_PASSWORD }}
          localDir: "build/dokka/html/"
          remoteDir: "dokka/"

  documentation:
    name: "User Documentation"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip3 install -r requirements.txt
      - run: mkdocs build -d build/site/
      - name: Upload documentation
        uses: sebastianpopp/ftp-action@releases/v2
        if: github.ref == 'refs/heads/main' || contains(github.ref, 'refs/tags/')
        with:
          host: ${{ secrets.WEBSPACE_HOST }}
          user: ${{ secrets.WEBSPACE_USER }}
          password: ${{ secrets.WEBSPACE_PASSWORD }}
          localDir: "build/site/"
          remoteDir: "."

  deployment_linting:
    name: "Deployment Linting"
    runs-on: ubuntu-latest
    concurrency:
      group: "linting-k8s-${{ github.ref }}"
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
      - name: "Register Matchers"
        run: echo "::add-matcher::.github/matchers/kube-linter.json"
      - name: Scan yamls
        id: kube-lint-scan
        uses: stackrox/kube-linter-action@v1
        with:
          directory: deployment/k8s/
          # config: .kube-linter/config.yaml
